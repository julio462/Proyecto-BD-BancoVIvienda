<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Colaborador</title>
</head>
<body>

<h1>Panel Colaborador</h1>

<button onclick="verClientes()">Ver Clientes</button>
<button onclick="verSolicitudes()">Ver Solicitudes</button>

<div id="resultado"></div>

<script>
async function verClientes() {
    const res = await fetch('http://localhost:3000/clientes');
    const data = await res.json();

    document.getElementById("resultado").innerHTML =
        JSON.stringify(data, null, 2);
}

async function verSolicitudes() {
    const res = await fetch('http://localhost:3000/solicitudes');
    const data = await res.json();

    document.getElementById("resultado").innerHTML =
        JSON.stringify(data, null, 2);
}
</script>
<script>
async function verUsuarios() {
    const res = await fetch('http://localhost:3000/usuarios');
    const data = await res.json();

    let html = `
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Acciones</th>
        </tr>
    `;

    data.forEach(u => {
        html += `
        <tr>
            <td>${u.id_usuario}</td>
            <td>${u.username}</td>
            <td>
                <button onclick="eliminar(${u.id_usuario})">Eliminar</button>
            </td>
        </tr>
        `;
    });

    html += "</table>";

    document.getElementById("resultado").innerHTML = html;
}

async function eliminar(id) {
    await fetch(`http://localhost:3000/usuarios/${id}`, {
        method: 'DELETE'
    });

    verUsuarios();
}
</script>
</body>
</html>
